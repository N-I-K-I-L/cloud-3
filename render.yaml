services:
  - type: web
    name: resume-portfolio-generator
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    disk:
      name: media-data
      mountPath: /var/data
      sizeGB: 1
    healthCheckPath: /
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: MEDIA_ROOT
        value: "/var/data/media"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: resume-portfolio-db
          property: connectionString

databases:
  - name: resume-portfolio-db
    plan: free
